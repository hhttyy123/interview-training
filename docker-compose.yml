version: '3'

services:
  # 微信通知服务 (Python 3.8.10)
  wechat-service:
    image: python:3.8-slim
    container_name: wechat-notifier
    volumes:
      - ./wechat:/app
    working_dir: /app
    command: python3 notify.py
    networks:
      - chem-network
    restart: unless-stopped

  # AI 聊天后端
  ai-chem-backend:
    image: crpi-zapnyuqlrws037uw.cn-shanghai.personal.cr.aliyuncs.com/chemtutor/ai-backend:v2
    container_name: ai-chem-backend
    environment:
      - GLM_API_KEY=10ba5ae71e6d4a5dbd4c5abe168002c4.JhPqIaJC9jMMZQMT
    volumes:
      - ./ai_chem/backend/data:/app/data
    restart: unless-stopped
    networks:
      - chem-network

  # 博客应用
  blog:
    image: crpi-zapnyuqlrws037uw.cn-shanghai.personal.cr.aliyuncs.com/chemtutor/blog:v5
    container_name: blog-app
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=Hty061120
      - DB_NAME=blog_db
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - chem-network

  # 3D 可视化后端
  3d-vis:
    image: crpi-zapnyuqlrws037uw.cn-shanghai.personal.cr.aliyuncs.com/chemtutor/3d-vis:v2
    container_name: 3d-vis-backend
    restart: unless-stopped
    networks:
      - chem-network

  # AI 面试训练前端
  ai-interview-web:
    image: ${WEB_IMAGE}
    container_name: ai-interview-web
    restart: unless-stopped
    networks:
      - chem-network

  # AI 面试训练接口服务
  ai-interview-token-api:
    image: ${SERVER_IMAGE}
    container_name: ai-interview-token-api
    env_file:
      - ./.env.production
    command: ["python", "-m", "uvicorn", "token_server:app", "--host", "0.0.0.0", "--port", "8787"]
    depends_on:
      - ai-interview-livekit
    restart: unless-stopped
    networks:
      - chem-network

  # AI 面试训练语音 Agent
  ai-interview-agent:
    image: ${SERVER_IMAGE}
    container_name: ai-interview-agent
    env_file:
      - ./.env.production
    command: ["python", "agent.py"]
    depends_on:
      - ai-interview-livekit
      - ai-interview-token-api
    restart: unless-stopped
    networks:
      - chem-network

  # LiveKit 实时语音服务
  ai-interview-livekit:
    image: livekit/livekit-server:latest
    container_name: ai-interview-livekit
    command: ["--config", "/etc/livekit.yaml"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./ai_interview/livekit/livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped
    networks:
      - chem-network

  # Nginx 网关
  nginx:
    image: nginx:alpine
    container_name: chem-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 对应截图：/root/nginx/nginx.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 对应截图：/root/nginx/certs 目录
      - ./nginx/certs:/etc/nginx/ssl:ro
      # 对应截图：/root/chem_project/dist
      - ./chem_project/dist:/usr/share/nginx/html/chem:ro
    restart: unless-stopped
    depends_on:
      - ai-chem-backend
      - blog
      - 3d-vis
      - ai-interview-web
      - ai-interview-token-api
      - ai-interview-livekit
    networks:
      - chem-network

  # 数据库
  mysql:
    image: mysql:8.0
    container_name: blog-db
    environment:
      - MYSQL_ROOT_PASSWORD=Hty061120
      - MYSQL_DATABASE=blog_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - chem-network

networks:
  chem-network:
    driver: bridge
