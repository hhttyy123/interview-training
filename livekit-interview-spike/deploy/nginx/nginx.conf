events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name catal.online www.catal.online;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name catal.online www.catal.online;

        ssl_certificate     /etc/nginx/ssl/catal.online_bundle.pem;
        ssl_certificate_key /etc/nginx/ssl/catal.online.key;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_protocols TLSv1.2 TLSv1.3;

        # AI 面试训练前端。使用非常规前缀，避免和主域名已有项目冲突。
        location /ai-interview-studio-2606/ {
            proxy_pass http://ai-interview-web:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        client_max_body_size 20m;

        # AI 面试训练后端。不要用 /api，避免和已有项目 API 冲突。
        location /ai-interview-gateway-2606/ {
            proxy_pass http://ai-interview-token-api:8787/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # LiveKit WebSocket 入口。RTC TCP/UDP 端口仍需在安全组开放。
        location /ai-interview-realtime-2606/ {
            proxy_pass http://ai-interview-livekit:7880/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }
}
